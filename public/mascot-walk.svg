    <!-- 몸통 틸 (아래) -->
    <path d="M242 470 H502 V618 A120 120 0 0 1 242 618 Z" fill="#1F7263"/>
    <!-- 머리 흰색 (위) -->
    <path d="M242 470 H502 V342 A120 120 0 0 0 242 342 Z" fill="#FFFFFF"/>
    <!-- 이음선 -->
    <rect x="242" y="464" width="260" height="13" rx="6" fill="#E0EBE8"/>
